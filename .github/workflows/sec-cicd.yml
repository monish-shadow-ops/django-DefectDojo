name: Security CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-docker-containers:
    uses: ./.github/workflows/build-docker-images-for-testing.yml
    secrets: inherit
    with:
      platform: linux/amd64

  test-rest-framework:
    needs: build-docker-containers
    uses: ./.github/workflows/rest-framework-tests.yml
    secrets: inherit
    with:
      platform: linux/amd64
      v3_feature_locations: false

  slack_after_tests:
    needs: test-rest-framework
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Slack - Test Result
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🧪 TEST COMPLETED\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nStatus: ${{ needs.test-rest-framework.result }}"
            }

  trivy_scan:
    needs: test-rest-framework
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

  slack_after_scan:
    needs: trivy_scan
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Slack - Scan Result
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔐 SCAN COMPLETED\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nStatus: ${{ needs.trivy_scan.result }}"
            }

  versioning:
    needs: [test-rest-framework, trivy_scan]
    runs-on: ubuntu-latest
    if: success()

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          TAG_PREFIX: v

  docker_build_push:
    needs: versioning
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest tag
        run: echo "TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            monishshadowops/defectdojo:${{ env.TAG }}
            monishshadowops/defectdojo:latest

  deploy_ec2:
    needs: docker_build_push
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull monishshadowops/defectdojo:latest

            docker stop defectdojo || true
            docker rm defectdojo || true

            docker run -d \
              --name defectdojo \
              -p 80:8080 \
              monishshadowops/defectdojo:latest

  slack_final:
    needs: deploy_ec2
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Final Slack Notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 DEPLOYMENT COMPLETE\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nStatus: ${{ needs.deploy_ec2.result }}"
            }
