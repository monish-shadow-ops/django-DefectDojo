name: "Build Docker Images For Testing"

on:
  workflow_dispatch:
    inputs:
      platform:
        type: string
        default: "linux/amd64"

  workflow_call:
    inputs:
      platform:
        type: string
        default: "linux/amd64"

jobs:
  build:
    name: Build Docker Images
    runs-on: ${{ inputs.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    strategy:
      matrix:
        docker-image: [django, nginx, integration-tests]
        os: [alpine, debian]
        platform: ["${{ inputs.platform }}"]

        exclude:
          - docker-image: nginx
            os: debian
          - docker-image: integration-tests
            os: alpine
          - docker-image: integration-tests
            platform: linux/arm64

    steps:
      - name: Set-platform
        run: |
          platform=${{ inputs.platform }}
          echo "PLATFORM=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Read Docker Image Identifiers
        id: read-docker-image-identifiers
        run: echo "IMAGE_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ✅ Buildx setup (already present, kept)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 🔥 UPDATED BUILD STEP WITH CACHE
      - name: Build (with cache enabled)
        uses: docker/build-push-action@v7
        timeout-minutes: 15
        env:
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
        with:
          context: .

          push: false

          tags: >
            defectdojo/defectdojo-${{ matrix.docker-image }}:${{ matrix.os }},
            ${{ env.IMAGE_REPOSITORY }}/defectdojo-${{ matrix.docker-image }}:${{ matrix.os }}

          file: Dockerfile.${{ matrix.docker-image }}-${{ matrix.os }}

          outputs: type=docker,dest=${{ matrix.docker-image }}-${{ matrix.os }}-${{ env.PLATFORM }}_img

          # 🚀 CACHE (THIS IS THE SPEED BOOST)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image ${{ matrix.docker-image }} as artifact
        uses: actions/upload-artifact@v7
        with:
          name: built-docker-image-${{ matrix.docker-image }}-${{ matrix.os }}-${{ env.PLATFORM }}
          path: ${{ matrix.docker-image }}-${{ matrix.os }}-${{ env.PLATFORM }}_img
          retention-days: 1
